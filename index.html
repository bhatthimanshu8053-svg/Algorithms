<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadline Intelligence | Student Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="auth-main-title">Student Login</h2>
        <input type="email" id="email" placeholder="Enter Your Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn btn-p" onclick="handleAuth()" id="authBtn">Login</button>
        <p class="auth-footer">
            <span id="auth-footer-text">Don't have an account?</span> 
            <span onclick="switchScreen()" id="toggleMsg" style="color:#6366f1; cursor:pointer; font-weight:700; text-decoration:underline;">Create Account</span>
        </p>
    </div>
</div>

<div id="app-screen">
    <header>
        <div class="header-left"><i data-lucide="zap" color="#6366f1"></i><h1>Dashboard</h1></div>
        <div class="header-right"><span id="userMail"></span><button class="logout-btn" onclick="logout()">Logout</button></div>
    </header>

    <div id="systemAlert" class="alert-container hidden"></div>

    <div class="main-container">
        <div class="glass-card">
            <h3><i data-lucide="plus-circle"></i> New Mission</h3>
            <div class="form-group"><label>TITLE</label><input type="text" id="tName"></div>
            
            <div class="form-group">
                <label>CATEGORY</label>
                <select id="tCat">
                    <option value="General">📁 General</option>
                    <option value="PBL">🚀 PBL</option>
                    <option value="Assignment">📝 Assignment</option>
                    <option value="Exam">🎓 Exam</option>
                </select>
            </div>

            <div class="form-group">
                <label>PRIORITY</label>
                <select id="tPrio">
                    <option value="3">High</option>
                    <option value="2">Medium</option>
                    <option value="1">Low</option>
                </select>
            </div>

            <div class="form-group"><label>DEADLINE</label><input type="date" id="tDate"></div>
            <button class="btn btn-p" onclick="saveTask()">Deploy</button>
        </div>
        <div class="glass-card">
            <div class="search-section">
                <div class="search-box-pro">
                    <i data-lucide="search" size="18"></i>
                    <input type="text" id="searchInput" placeholder="Find objective...">
                </div>
            </div>
            <div class="task-header-row" style="display: grid; grid-template-columns: 60px 1fr 150px 100px; padding: 12px 20px; background: #1e253a; border-radius: 10px 10px 0 0; font-size: 11px; font-weight: 800; color: #94a3b8; border-bottom: 2px solid #2d334a;">
                <span>DONE</span>
                <span>TASK NAME</span>
                <span>DEADLINE</span>
                <span>ACTIONS</span>
            </div>

            <div id="taskList" class="task-list" style="background: rgba(22, 27, 44, 0.5); border-radius: 0 0 15px 15px;">
                
            </div>
        </div>
         <div class="glass-card">
            <h3><i data-lucide="bar-chart-3"></i> Mission Analytics</h3>
            <div class="stats-grid">
                <div class="stat-box">
                    <label>TOTAL</label>
                    <div id="totalCount" class="stat-val">0</div>
                </div>
                <div class="stat-box">
                    <label style="color: #10b981;">COMPLETED</label>
                    <div id="completedCount" class="stat-val" style="color: #10b981;">0</div>
                </div>
                <div class="stat-box">
                    <label style="color: #f59e0b;">UPCOMING</label>
                    <div id="upcomingCount" class="stat-val" style="color: #f59e0b;">0</div>
                </div>
                <div class="stat-box">
                    <label style="color: #ef4444;">MISSED</label>
                    <div id="missedCount" class="stat-val" style="color: #ef4444;">0</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
